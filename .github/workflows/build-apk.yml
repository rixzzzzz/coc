name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build-android:
    name: Build COC AutoFarmer (x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache Buildozer global
        uses: actions/cache@v4
        with:
          path: .buildozer_global
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
      - name: Force x86_64 architecture
        run: |
          sed -i 's/^android\.archs *=.*/android.archs = x86_64/' buildozer.spec
          grep -nE '^android\.archs' buildozer.spec
      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: .
          command: buildozer android debug
          buildozer_version: stable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cocfarmer-x86_64-debug
          path: ${{ steps.buildozer.outputs.filename }}

name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build COC AutoFarmer (x86_64)
    runs-on: ubuntu-24.04          # LTS stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev \
            build-essential ccache libltdl-dev

      # === Combo STABLE pour Kivy 2.3.0 : p4a 2024.1.21 = Python 3.11.5 + NDK 25b ===
      - name: Install Buildozer + Cython (versions verrouillees)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "buildozer==1.5.0" "python-for-android==2024.1.21" "cython==0.29.36"

      # === Cible emulateur MuMu : x86_64 / API 33 / NDK 25b ===
      - name: Patch buildozer.spec (cible emulateur)
        run: |
          sed -i 's/^android\.archs *=.*/android.archs = x86_64/' buildozer.spec
          sed -i 's/^android\.api *=.*/android.api = 33/' buildozer.spec
          sed -i 's/^android\.ndk *=.*/android.ndk = 25b/' buildozer.spec
          echo "---- config apres patch ----"
          grep -nE '^(requirements|android\.(archs|api|ndk|minapi|ndk_api)) ' buildozer.spec

      - name: Cache Buildozer SDK/NDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-py311-ndk25b-${{ hashFiles('buildozer.spec') }}

      - name: Build APK (debug)
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cocfarmer-x86_64-debug
          path: bin/*.apk
